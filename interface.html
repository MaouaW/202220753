
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Art Gallery</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Georgia, serif;
  }

  body {
    background: #faf9f6;
    color: #222;
  }

  nav {
    background: #1a1a2e;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 32px;
  }

  nav .logo {
    font-size: 20px;
  }

  nav a {
    color: #ccc;
    text-decoration: none;
    margin-left: 20px;
    font-size: 14px;
  }

  .page {
    display: none;
    padding: 32px;
  }

  .page.active {
    display: block;
  }

  .gallery {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 20px;
    max-width: 500px;
  }

  .card {
    background: white;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }

  .card-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }

  .card-body {
    padding: 14px;
  }

  .card-title {
    font-weight: bold;
    margin-bottom: 4px;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .price {
    font-weight: bold;
    color: #1a1a2e;
  }

  .btn {
    background: #1a1a2e;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
  }

  .form-box {
    max-width: 420px;
    margin: 40px auto;
    background: white;
    padding: 32px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }

  .form-box h2 {
    margin-bottom: 20px;
    text-align: center;
    color: #1a1a2e;
  }

  .form-box input {
    width: 100%;
    padding: 10px;
    margin-bottom: 14px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
  }

  .form-box button {
    width: 100%;
    padding: 12px;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
  }

  .switch {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
    color: #888;
  }

  .switch a {
    color: #1a1a2e;
    cursor: pointer;
  }
</style>
</head>
<body>

<nav>
  <div class="logo">ArtVault</div>
  <div>
    <a href="#" onclick="show('gallery')">Gallery</a>
    <a href="#" onclick="show('register')">Register</a>
    <a href="#">Cart</a>
  </div>
</nav>

<div id="gallery" class="page active">
  <h2>Browse Artworks</h2>

  <div class="gallery">
    <div class="card">
      <img class="card-img" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Sunset Valley">
      <div class="card-body">
        <div class="card-title">Sunset Valley</div>
        <div class="card-footer">
          <span class="price">$320</span>
          <button class="btn">Add to Cart</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img class="card-img" src="https://images.unsplash.com/photo-1515405295579-ba7b45403062" alt="Urban Reflections">
      <div class="card-body">
        <div class="card-title">Urban Reflections</div>
        <div class="card-footer">
          <span class="price">$180</span>
          <button class="btn">Add to Cart</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img class="card-img" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="Nature's Silence">
      <div class="card-body">
        <div class="card-title">Nature's Silence</div>
        <div class="card-footer">
          <span class="price">$450</span>
          <button class="btn">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="register" class="page">
  <div class="form-box">
    <h2>Create Account</h2>
    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email Address">
    <input type="password" placeholder="Password">
    <input type="tel" placeholder="Phone Number">
    <button>Register</button>
    <div class="switch">Already have an account? <a>Login</a></div>
  </div>
</div>

<script>
  function show(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>

</body>
</html>
